<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class=" min-h-screen max-w-md mx-auto shadow shadow-gray-500 rounded-3xl py-5">
    <div
        class=" flex flex-col justify-center items-center w-10/12 mx-auto py-10 space-y-3 shadow shadow-gray-500 rounded-3xl">
        <img class="flex justify-center items-center" src="./assets/github-logo.png" alt="">
        <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
        <p class="text-neutral-500">Sign in to manage your issues</p>
    </div>
    <div class="form mx-auto pt-8">
        <div class="card bg-base-100 w-full max-w-sm shrink-0  shadow shadow-gray-500 mx-auto rounded-3xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold text-lg">Username</label>
                    <input id="input-name" value="" class="input rounded-full bg-base-300" type="text"
                        placeholder="Enter Username" />
                    <p class="text-[#4A00FF]">Default: admin</p>

                    <label class="label text-neutral font-bold text-lg">Password</label>
                    <input value="" id="input-pin" class="input rounded-full bg-base-300" type="password"
                        placeholder="Enter Password" />
                    <p class="text-[#4A00FF]">Default: admin123</p>
                    <button id="btn-login" class="btn btn-primary rounded-full mt-4">Sign In</button>
                </fieldset>
            </div>

        </div>
    </div>
    <p class="text-center text-neutral-500 mt-5">Demo Credentials:</p>
    <div class=" w-10/12 mx-auto my-5 bg-gray-100 py-5 px-5 text-center">
        <p>Username: <span class="text-neutral-500">admin</span> </p>
        <p>Password: <span class="text-neutral-500">admin123</span></p>
    </div>
    <script src="./login.js"></script>
</body>

</html>
